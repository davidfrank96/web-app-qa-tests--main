name: QA Enforcement

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  qa:
    name: Playwright QA Gate
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CI: "true"
      LOCALMAN_URL: ${{ secrets.LOCALMAN_URL }}
      KBEAN_URL: ${{ secrets.KBEAN_URL }}
      INSSA_URL: ${{ secrets.INSSA_URL }}
      LOCALMAN_ADMIN_EMAIL: ${{ secrets.LOCALMAN_ADMIN_EMAIL }}
      LOCALMAN_ADMIN_PASSWORD: ${{ secrets.LOCALMAN_ADMIN_PASSWORD }}
      INSSA_TEST_EMAIL: ${{ secrets.INSSA_TEST_EMAIL }}
      INSSA_TEST_PASSWORD: ${{ secrets.INSSA_TEST_PASSWORD }}
      PLAYWRIGHT_HTML_OPEN: never

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run QA suite
        run: npm run test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: error
          retention-days: 7
